---
- name: Maintain the Codex project VM
  hosts: codex_vm
  gather_facts: true
  become: true

  tasks:
    - name: Install Ubuntu updates
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        autoclean: true
        autoremove: true
        cache_valid_time: 3600

    - name: Upgrade Codex CLI from the official installer
      ansible.builtin.shell: |
        set -o pipefail
        curl -fsSL https://chatgpt.com/codex/install.sh | CODEX_NON_INTERACTIVE=1 sh
      args:
        executable: /bin/bash
      become_user: "{{ codex_user }}"
      environment:
        HOME: "/home/{{ codex_user }}"
        PATH: "/home/{{ codex_user }}/.local/bin:/home/{{ codex_user }}/.codex/bin:/usr/local/bin:/usr/bin:/bin"
      changed_when: true

    - name: Update approved Git repositories without changing branches
      ansible.builtin.git:
        repo: "{{ item.repo }}"
        dest: "{{ item.dest }}"
        version: "{{ item.version | default('main') }}"
        update: true
        force: false
      become_user: "{{ codex_user }}"
      environment:
        HOME: "/home/{{ codex_user }}"
      loop: "{{ codex_projects }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Check whether a reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Show maintenance status
      ansible.builtin.debug:
        msg:
          - "Codex CLI and Ubuntu packages were updated."
          - "Reboot required: {{ reboot_required.stat.exists }}"
